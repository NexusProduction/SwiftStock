<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwiftStock — Login</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23000'/><path d='M18 4L8 18h8l-2 10 14-16h-9z' fill='%2330d158'/></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Firebase Compat SDK — no type=module, works in incognito/mobile/everywhere -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    [data-theme="dark"] {
      --bg: #060c10; --surface: #0d1a21; --card: #0f1e28;
      --card-border: rgba(0,230,118,0.15); --text: #e8f5ef; --text2: #94c9b2;
      --text3: #5a8f7a; --input-bg: #081520; --input-border: rgba(0,230,118,0.18);
      --green: #00e676; --green-dim: rgba(0,230,118,0.08); --green-glow: rgba(0,230,118,0.25);
      --red: #ff5252; --shadow: rgba(0,0,0,0.7);
    }

    html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .float-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .fli { position: absolute; animation: fliFloat linear infinite; }
    @keyframes fliFloat { 0%{transform:translateY(105vh) rotate(0deg);opacity:0}5%{opacity:1}95%{opacity:1}100%{transform:translateY(-8vh) rotate(540deg);opacity:0} }

    .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 200; display: flex; align-items: center; padding: 0.9rem 2rem; backdrop-filter: blur(20px); background: rgba(6,12,16,0.65); border-bottom: 1px solid var(--card-border); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.35rem; color: var(--green); text-decoration: none; display: flex; align-items: center; gap: 0.45rem; }

    .page { position: relative; z-index: 2; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 6rem 1.5rem 3rem; }

    .card { width: 100%; max-width: 440px; background: var(--card); border: 1px solid var(--card-border); border-radius: 28px; padding: 2.8rem 2.4rem; box-shadow: 0 40px 80px var(--shadow); position: relative; overflow: hidden; animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes cardIn { from{opacity:0;transform:translateY(30px) scale(0.97)}to{opacity:1;transform:none} }
    .card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,transparent,var(--green),transparent); }
    .card::after { content:''; position:absolute; top:-80px; left:50%; transform:translateX(-50%); width:280px; height:160px; background:radial-gradient(ellipse,var(--green-glow) 0%,transparent 70%); pointer-events:none; }

    .card-badge { display:inline-flex; align-items:center; gap:0.4rem; background:var(--green-dim); border:1px solid var(--card-border); border-radius:999px; padding:0.25rem 0.8rem; font-size:0.72rem; color:var(--green); letter-spacing:0.07em; text-transform:uppercase; font-weight:600; margin-bottom:0.8rem; }
    .card-title { font-family:'Syne',sans-serif; font-weight:800; font-size:2rem; letter-spacing:-0.03em; margin-bottom:0.3rem; }
    .card-sub { color:var(--text2); font-size:0.88rem; margin-bottom:2rem; }

    .field { margin-bottom: 1.1rem; }
    .field label { display:block; font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.09em; color:var(--text2); margin-bottom:0.4rem; }
    .field-wrap { position:relative; display:flex; align-items:center; }
    .fi { position:absolute; left:1rem; font-size:0.95rem; pointer-events:none; opacity:0.45; }
    .field input { width:100%; padding:0.85rem 1rem 0.85rem 2.8rem; background:var(--input-bg); border:1.5px solid var(--input-border); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:0.95rem; color:var(--text); outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
    .field input::placeholder { color:var(--text3); }
    .field input:focus { border-color:var(--green); box-shadow:0 0 0 3px var(--green-glow); background:var(--surface); }
    .pw-eye { position:absolute; right:1rem; background:none; border:none; cursor:pointer; font-size:1rem; color:var(--text2); padding:0; }
    .pw-eye:hover { color:var(--green); }
    .hint { font-size:0.72rem; color:var(--text3); margin-top:0.3rem; }

    .msg-box { font-size:0.84rem; min-height:1.3em; margin-bottom:0.8rem; text-align:center; font-weight:500; padding:0.35rem 0.5rem; border-radius:8px; line-height:1.4; }

    .login-btn { width:100%; padding:1rem; font-family:'Syne',sans-serif; font-weight:700; font-size:1.05rem; color:#060c10; background:var(--green); border:none; border-radius:14px; cursor:pointer; transition:transform 0.2s,box-shadow 0.3s,opacity 0.2s; box-shadow:0 4px 30px var(--green-glow); letter-spacing:0.02em; }
    .login-btn:hover { transform:translateY(-2px); box-shadow:0 8px 40px var(--green-glow); }
    .login-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

    .links-row { display:flex; justify-content:space-between; margin-top:1.2rem; flex-wrap:wrap; gap:0.5rem; }
    .link-btn { background:none; border:none; cursor:pointer; font-size:0.85rem; color:var(--text2); font-family:'DM Sans',sans-serif; transition:color 0.2s; padding:0; }
    .link-btn:hover { color:var(--green); }
    .link-btn.grn { color:var(--green); font-weight:600; }
    .divider { display:flex; align-items:center; gap:0.8rem; margin:1.4rem 0; color:var(--text3); font-size:0.78rem; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--input-border); }
    .signup-row { text-align:center; font-size:0.88rem; color:var(--text2); }
    .signup-row a { color:var(--green); text-decoration:none; font-weight:600; }

    .success-overlay { display:none; position:absolute; inset:0; background:var(--card); border-radius:28px; flex-direction:column; align-items:center; justify-content:center; gap:1rem; z-index:10; }
    .success-overlay.show { display:flex; animation:cardIn 0.5s ease both; }
    .success-icon { width:72px; height:72px; border-radius:50%; background:var(--green-dim); border:2px solid var(--green); display:flex; align-items:center; justify-content:center; font-size:2rem; box-shadow:0 0 30px var(--green-glow); animation:popIn 0.6s cubic-bezier(0.16,1,0.3,1); }
    @keyframes popIn { from{transform:scale(0) rotate(-90deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1} }

    .spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(6,12,16,0.3); border-top-color:#060c10; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:0.4rem; }
    @keyframes spin { to{transform:rotate(360deg)} }

    @media(max-width:480px){ .card{padding:2rem 1.5rem;border-radius:20px;} .card-title{font-size:1.7rem;} }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="float-layer" id="floatLayer"></div>

<div class="topbar">
  <a href="index.html" class="logo">
    <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
      <rect x="2" y="8" width="28" height="18" rx="3" stroke="currentColor" stroke-width="2"/>
      <path d="M8 8V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="2"/>
      <path d="M12 16h8M12 20h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    SwiftStock
  </a>
</div>

<main class="page">
  <div class="card">

    <div class="success-overlay" id="successOverlay">
      <div class="success-icon">✓</div>
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;">Welcome back!</div>
      <div style="color:var(--text2);font-size:0.9rem;text-align:center;" id="successMsg">Redirecting to dashboard…</div>
    </div>

    <div class="card-badge">🔑 Owner / Staff Login</div>
    <h1 class="card-title">Login</h1>
    <p class="card-sub">Enter your credentials to access your godowns</p>

    <div class="field">
      <label>Your Name</label>
      <div class="field-wrap">
        <span class="fi">👤</span>
        <input type="text" id="inp-name" placeholder="e.g. Rahul Sharma" autocomplete="name"
          onkeydown="if(event.key==='Enter')document.getElementById('inp-corpid').focus()" />
      </div>
    </div>

    <div class="field">
      <label>Corporate ID</label>
      <div class="field-wrap">
        <span class="fi">🏷️</span>
        <input type="text" id="inp-corpid" placeholder="SWFT0000001" maxlength="11"
          style="text-transform:uppercase;letter-spacing:0.07em;font-family:'DM Mono',monospace;"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter')document.getElementById('inp-password').focus()" />
      </div>
      <div class="hint">From your credential card — SWFT + 7 digits</div>
    </div>

    <div class="field" style="margin-bottom:1.5rem;">
      <label>Password</label>
      <div class="field-wrap">
        <span class="fi">🔒</span>
        <input type="password" id="inp-password" placeholder="Your password"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()" />
        <button class="pw-eye" type="button" id="pwEye" onclick="togglePw()">👁️</button>
      </div>
    </div>

    <div class="msg-box" id="msgBox"></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Enter →</button>

    <div class="links-row">
      <button class="link-btn" onclick="doForgotPw()">Forgot password?</button>
      <button class="link-btn grn" onclick="location.href='signup.html'">Create account →</button>
    </div>
    <div class="divider">or</div>
    <div class="signup-row">New company? <a href="signup.html">Sign up as Owner</a></div>

  </div>
</main>

<script>
// ═══════════════════════════════════════════════════════
//  FIREBASE — compat SDK, no type=module
//  Works in: incognito, mobile Safari, Firefox, Chrome
// ═══════════════════════════════════════════════════════
firebase.initializeApp({
  apiKey:            "AIzaSyB0eMJQLfsBEkFaoxDMIscSfJ-VlK5Rrk4",
  authDomain:        "store-management-nexus.firebaseapp.com",
  projectId:         "store-management-nexus",
  storageBucket:     "store-management-nexus.firebasestorage.app",
  messagingSenderId: "263693510395",
  appId:             "1:263693510395:web:47a0485221405dbb6fb25e"
});
const auth = firebase.auth();
const db   = firebase.firestore();

// ═══════════════════════════════════════════════════════
//  LOGIN FLOW
//  1. Query Firestore by corporateId (allowed without auth in rules)
//  2. Verify name matches
//  3. signInWithEmailAndPassword using the email we found
//  4. Save session + redirect
// ═══════════════════════════════════════════════════════
async function doLogin() {
  const name   = document.getElementById('inp-name').value.trim();
  const corpId = document.getElementById('inp-corpid').value.trim().toUpperCase();
  const pw     = document.getElementById('inp-password').value;
  const btn    = document.getElementById('loginBtn');

  if (!name)   { setMsg('⚠ Please enter your name.','error'); return; }
  if (!corpId) { setMsg('⚠ Please enter your Corporate ID.','error'); return; }
  if (!/^SWFT\d{7}$/.test(corpId)) { setMsg('⚠ Format: SWFT followed by 7 digits (e.g. SWFT0000001)','error'); return; }
  if (!pw)     { setMsg('⚠ Please enter your password.','error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';
  setMsg('','');

  try {
    // Step 1 — Find user by corporateId
    // NOTE: Firestore rules must have "allow read: if true" on /users
    // so this query works before the user is authenticated
    const snap = await db.collection('users')
      .where('corporateId', '==', corpId)
      .get();

    if (snap.empty) {
      setMsg('⚠ Corporate ID not found. Check your credential card.','error');
      resetBtn(); return;
    }

    const userData = snap.docs[0].data();

    // Step 2 — Verify name matches (case-insensitive)
    if (userData.name.trim().toLowerCase() !== name.toLowerCase()) {
      setMsg('⚠ Name does not match your credential card.','error');
      resetBtn(); return;
    }

    // Step 3 — Sign in with Firebase Auth
    await auth.signInWithEmailAndPassword(userData.email, pw);

    // Step 4 — Success
    sessionStorage.setItem('swiftUser', JSON.stringify(userData));
    document.getElementById('successMsg').textContent = 'Welcome, ' + userData.name + '!';
    document.getElementById('successOverlay').classList.add('show');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);

  } catch(err) {
    console.error('Login error:', err.code, err.message);
    let msg = '❌ Login failed — ' + err.message;
    if (['auth/wrong-password','auth/invalid-credential','auth/invalid-login-credentials'].includes(err.code))
      msg = '⚠ Wrong password. Please try again.';
    else if (err.code === 'auth/user-not-found')
      msg = '⚠ No account found. Check your Corporate ID.';
    else if (err.code === 'auth/too-many-requests')
      msg = '⚠ Too many failed attempts. Wait a few minutes.';
    else if (err.code === 'auth/network-request-failed')
      msg = '⚠ No internet connection. Check your network.';
    else if (err.code === 'auth/user-disabled')
      msg = '⚠ Account disabled. Contact your company owner.';
    else if (err.code === 'permission-denied' || (err.message||'').includes('permission'))
      msg = '⚠ Firestore rules error — update Firestore rules to: allow read: if true; on users collection.';
    setMsg(msg, 'error');
    resetBtn();
  }
}

// ═══════ FORGOT PASSWORD ═══════
async function doForgotPw() {
  const corpId = document.getElementById('inp-corpid').value.trim().toUpperCase();
  if (!corpId || !/^SWFT\d{7}$/.test(corpId)) {
    setMsg('⚠ Enter your Corporate ID first, then click Forgot Password.','error'); return;
  }
  setMsg('🔍 Looking up your account…','info');
  try {
    const snap = await db.collection('users').where('corporateId','==',corpId).get();
    if (snap.empty) { setMsg('⚠ Corporate ID not found.','error'); return; }
    await auth.sendPasswordResetEmail(snap.docs[0].data().email);
    setMsg('✅ Password reset email sent!','success');
  } catch(e) { setMsg('⚠ Failed: ' + e.message,'error'); }
}

// ═══════ HELPERS ═══════
function setMsg(msg, type) {
  const el = document.getElementById('msgBox');
  el.textContent = msg;
  el.style.color = type==='error'?'var(--red)':type==='success'?'var(--green)':'var(--text2)';
}
function resetBtn() {
  const b = document.getElementById('loginBtn');
  b.disabled = false; b.textContent = 'Enter →';
}
function togglePw() {
  const i = document.getElementById('inp-password'), b = document.getElementById('pwEye');
  i.type = i.type==='password'?'text':'password';
  b.textContent = i.type==='password'?'👁️':'🙈';
}

// Already logged in? Go to dashboard - BUT not if user just logged out
auth.onAuthStateChanged(u => {
  if (u) {
    if (sessionStorage.getItem('sw_logout')) {
      sessionStorage.removeItem('sw_logout'); // clear flag, stay on login page
    } else {
      window.location.href = 'dashboard.html'; // genuinely logged in, redirect
    }
  }
});

// ═══════ BACKGROUND ═══════
const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
let W,H; function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;} resize(); window.addEventListener('resize',resize);
const pts=Array.from({length:55},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:.5+Math.random()*1.4,op:.05+Math.random()*.1}));
function draw(){
  ctx.clearRect(0,0,W,H);
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);
  g.addColorStop(0,'rgba(13,30,40,1)');g.addColorStop(1,'rgba(6,12,16,1)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  pts.forEach((p,i)=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
    pts.slice(i+1).forEach(q=>{const d=Math.hypot(p.x-q.x,p.y-q.y);if(d<130){ctx.strokeStyle=`rgba(0,230,118,${.05*(1-d/130)})`;ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();}});
    ctx.fillStyle=`rgba(0,230,118,${p.op})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
const icons=['📦','🏪','🗂️','🔄','📊','🔑','⚡','📋','🏷️','📈','✅'];
const fl=document.getElementById('floatLayer');
icons.forEach((ic,i)=>{const el=document.createElement('div');el.className='fli';el.textContent=ic;el.style.cssText=`left:${(i*9+2)%94}%;font-size:${1.4+Math.random()}rem;opacity:0.055;animation-duration:${15+Math.random()*12}s;animation-delay:-${Math.random()*18}s;`;fl.appendChild(el);});
window.addEventListener('load',()=>document.getElementById('inp-name').focus());
</script>
</body>
</html>
